<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Wheat icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f2937" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="grain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcd34d" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
  </defs>

  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#bg)" />

  <!-- Stem -->
  <path d="M32 14 L32 50" stroke="#fde68a" stroke-width="2.2" stroke-linecap="round" />

  <!-- Left grains -->
  <ellipse cx="27.5" cy="19" rx="3.2" ry="2" fill="url(#grain)" transform="rotate(-30 27.5 19)" />
  <ellipse cx="27" cy="24.5" rx="3.2" ry="2" fill="url(#grain)" transform="rotate(-30 27 24.5)" />
  <ellipse cx="26.8" cy="30" rx="3.2" ry="2" fill="url(#grain)" transform="rotate(-30 26.8 30)" />
  <ellipse cx="27.2" cy="35.5" rx="3.2" ry="2" fill="url(#grain)" transform="rotate(-30 27.2 35.5)" />
  <ellipse cx="28" cy="41" rx="3.2" ry="2" fill="url(#grain)" transform="rotate(-30 28 41)" />

  <!-- Right grains -->
  <ellipse cx="36.5" cy="21" rx="3.2" ry="2" fill="url(#grain)" transform="rotate(30 36.5 21)" />
  <ellipse cx="37" cy="26.5" rx="3.2" ry="2" fill="url(#grain)" transform="rotate(30 37 26.5)" />
  <ellipse cx="37.2" cy="32" rx="3.2" ry="2" fill="url(#grain)" transform="rotate(30 37.2 32)" />
  <ellipse cx="36.8" cy="37.5" rx="3.2" ry="2" fill="url(#grain)" transform="rotate(30 36.8 37.5)" />
  <ellipse cx="36" cy="43" rx="3.2" ry="2" fill="url(#grain)" transform="rotate(30 36 43)" />
</svg>